<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerund vs Infinitive Trainer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #f7faf7;
            --accent-teal: #007e7a; 
            --text-dark: #1a1a1a; 
            --circle-color: rgba(0, 126, 122, 0.05); 
            --white: #ffffff;
        }
        body { 
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-dark); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
            font-size: 1.2rem;
        }
        .decoration { position: fixed; top: 0; right: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; }
        .circle-big { position: absolute; width: 450px; height: 450px; border-radius: 50%; background: var(--circle-color); top: -100px; right: -100px; }
        .circle-small-1 { position: absolute; width: 180px; height: 180px; border-radius: 50%; background: var(--circle-color); top: 80px; right: 300px; }
        .circle-small-2 { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: var(--circle-color); top: 250px; right: 180px; }

        .container { background: var(--white); padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 90%; max-width: 900px; margin: 40px 0; z-index: 1; }
        .hidden { display: none !important; }
        
        h1, h3 { color: var(--accent-teal); text-align: center; }

        nav { margin-bottom: 30px; display: flex; gap: 15px; justify-content: center; }
        nav button { background: white; border: 2px solid var(--accent-teal); color: var(--accent-teal); padding: 12px 24px; cursor: pointer; border-radius: 15px; font-weight: 600; font-family: inherit; font-size: 1rem; transition: 0.3s; }
        nav button.active { background: var(--accent-teal); color: white; }

        input[type="text"] { padding: 15px; width: 80%; max-width: 300px; border: 2px solid #eee; border-radius: 15px; font-size: 20px; font-family: inherit; display: block; margin: 20px auto; text-align: center; }
        .btn-main { background: var(--accent-teal); color: white; border: none; padding: 18px 50px; border-radius: 15px; cursor: pointer; font-size: 20px; font-weight: 600; font-family: inherit; display: block; margin: 20px auto; }

        .items-box { margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 12px; padding: 25px; border: 3px solid #f0f0f0; border-radius: 20px; min-height: 60px; justify-content: center; }
        .draggable { background: white; border: 2px solid var(--accent-teal); padding: 12px 18px; border-radius: 12px; cursor: grab; font-size: 17px; user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .drag-container { display: flex; gap: 20px; margin-top: 20px; }
        .drop-zone { flex: 1; min-height: 200px; border: 3px dashed #ccd; border-radius: 20px; padding: 15px; background: rgba(0, 126, 122, 0.01); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .drop-zone h4 { margin: 0 0 10px 0; color: var(--accent-teal); font-size: 1.4rem; }

        .test-item { margin-bottom: 25px; padding: 20px; background: #fafafa; border-radius: 15px; border-left: 5px solid var(--accent-teal); }
        select { padding: 10px; border-radius: 10px; border: 2px solid var(--accent-teal); font-family: inherit; font-size: 18px; cursor: pointer; background: white; }

        #chartContainer { width: 300px; margin: 20px auto; position: relative; }
        .score-text { text-align: center; font-size: 2rem; font-weight: 600; color: var(--accent-teal); margin-bottom: 20px; }
        .mistakes-list { color: #d93025; list-style: none; padding: 0; }
        .mistakes-list li { margin-bottom: 12px; padding: 15px; background: #fff5f5; border-radius: 12px; border: 1px solid #fed7d7; font-size: 1.1rem; }
        u { text-decoration: underline; font-weight: 600; color: var(--accent-teal); }
    </style>
</head>
<body>

    <div class="decoration">
        <div class="circle-big"></div>
        <div class="circle-small-1"></div>
        <div class="circle-small-2"></div>
    </div>

    <div id="pageLogin" class="container">
        <h1>English Grammar Trainer</h1>
        <input type="text" id="userName" placeholder="Enter your name..." autocomplete="off">
        <button class="btn-main" onclick="startApp()">Start Training</button>
    </div>

    <div id="appWrapper" class="container hidden">
        <nav id="mainNav">
            <button onclick="showPage('pageSort')" id="btnSort" class="active">1. Sorting</button>
            <button onclick="showPage('pageTest')" id="btnTest">2. Test</button>
        </nav>

        <div id="pageSort" class="sub-page">
            <h3>Sort rules to the correct category:</h3>
            <div id="itemsPool" class="items-box"></div>
            <div class="drag-container">
                <div id="zoneGerund" class="drop-zone" ondrop="handleDrop(event, 'gerund')" ondragover="allowDrop(event)">
                    <h4>Gerund</h4>
                </div>
                <div id="zoneInfinitive" class="drop-zone" ondrop="handleDrop(event, 'infinitive')" ondragover="allowDrop(event)">
                    <h4>Infinitive</h4>
                </div>
            </div>
        </div>

        <div id="pageTest" class="sub-page hidden">
            <h3>Choose the correct form:</h3>
            <div id="quizContainer"></div>
            <button class="btn-main" onclick="submitAll()">Finish & View Results</button>
        </div>

        <div id="pageResults" class="sub-page hidden">
            <h3>Well done, <span id="resName"></span>!</h3>
            <div id="chartContainer"><canvas id="resultChart"></canvas></div>
            <div id="scoreDisplay" class="score-text"></div>
            <div id="feedbackArea">
                <h4>Correct answers for your mistakes:</h4>
                <ul id="mistakesList" class="mistakes-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxaTe3ZYOxiOj-NbGTWBtSqLSZl8iIoUkzNoqoZdV7dNIQvCKB_APANI6EY_hobK2aa-A/exec";

        const rulesData = [
            { id: "r1", text: "As the subject of a sentence", type: "gerund" },
            { id: "r2", text: "To explain purpose (why)", type: "infinitive" },
            { id: "r3", text: "Immediately after adjectives", type: "infinitive" },
            { id: "r4", text: "After certain verbs like 'want'", type: "infinitive" },
            { id: "r5", text: "With 'go' for physical activities", type: "gerund" },
            { id: "r6", text: "After prepositions", type: "gerund" },
            { id: "r7", text: "After verbs of liking/disliking", type: "gerund" }
        ];

        // Каждое правило имеет 2 предложения (категории 0-6 соответствуют правилам выше)
        const questionsRaw = [
            { q: "[xxx] a new language is a great way to challenge your brain.", opt: ["Learning", "To learn"], ans: "Learning", cat: 0 },
            { q: "[xxx] alone can be a very rewarding experience.", opt: ["Traveling", "To travel"], ans: "Traveling", cat: 0 },
            { q: "He went to the library [xxx] some information.", opt: ["finding", "to find"], ans: "to find", cat: 1 },
            { q: "I’m saving money [xxx] a new laptop.", opt: ["buying", "to buy"], ans: "to buy", cat: 1 },
            { q: "It is often difficult [xxx] native speakers.", opt: ["understanding", "to understand"], ans: "to understand", cat: 2 },
            { q: "She was very surprised [xxx] her old friend.", opt: ["seeing", "to see"], ans: "to see", cat: 2 },
            { q: "My brother wants [xxx] to Spain.", opt: ["moving", "to move"], ans: "to move", cat: 3 },
            { q: "We decided [xxx] at home because of the rain.", opt: ["staying", "to stay"], ans: "to stay", cat: 3 },
            { q: "Every Saturday, we go [xxx] at the local pool.", opt: ["swimming", "to swim"], ans: "swimming", cat: 4 },
            { q: "We should go [xxx] in the mountains.", opt: ["hiking", "to hike"], ans: "hiking", cat: 4 },
            { q: "Are you interested in [xxx] the club?", opt: ["joining", "to join"], ans: "joining", cat: 5 },
            { q: "He apologized for [xxx] late to the meeting.", opt: ["being", "to be"], ans: "being", cat: 5 },
            { q: "I really enjoy [xxx] to podcasts.", opt: ["listening", "to listen"], ans: "listening", cat: 6 },
            { q: "Most of my classmates hate [xxx] up early.", opt: ["getting", "to get"], ans: "getting", cat: 6 }
        ];

        let shuffledQuestions = [];
        let userName = "";

        // Умное перемешивание, чтобы одинаковые категории не стояли рядом
        function shuffleQuestionsSmart(array) {
            let result = [];
            let pool = [...array].sort(() => Math.random() - 0.5);
            
            while (pool.length > 0) {
                let found = false;
                for (let i = 0; i < pool.length; i++) {
                    let lastItem = result[result.length - 1];
                    if (!lastItem || lastItem.cat !== pool[i].cat) {
                        result.push(pool.splice(i, 1)[0]);
                        found = true;
                        break;
                    }
                }
                // Если не нашли подходящего (остались только одинаковые), просто добавляем
                if (!found) result.push(pool.pop());
            }
            return result;
        }

        function startApp() {
            userName = document.getElementById('userName').value.trim();
            if (!userName) return alert("Please enter your name");
            
            document.getElementById('pageLogin').classList.add('hidden');
            document.getElementById('appWrapper').classList.remove('hidden');
            initSorting();
            initQuiz();
        }

        function showPage(pageId) {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            document.getElementById('btnSort').classList.toggle('active', pageId === 'pageSort');
            document.getElementById('btnTest').classList.toggle('active', pageId === 'pageTest');
        }

        function initSorting() {
            const pool = document.getElementById('itemsPool');
            pool.innerHTML = "";
            [...rulesData].sort(() => Math.random() - 0.5).forEach(rule => {
                const el = document.createElement('div');
                el.className = 'draggable';
                el.draggable = true;
                el.id = rule.id;
                el.innerText = rule.text;
                el.ondragstart = (e) => e.dataTransfer.setData("text", e.target.id);
                pool.appendChild(el);
            });
        }

        function allowDrop(e) { e.preventDefault(); }
        
        function handleDrop(e, targetType) {
            e.preventDefault();
            const id = e.dataTransfer.getData("text");
            const rule = rulesData.find(r => r.id === id);
            if (rule.type === targetType) {
                e.currentTarget.appendChild(document.getElementById(id));
            }
        }

        function initQuiz() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = "";
            shuffledQuestions = shuffleQuestionsSmart(questionsRaw);
            
            shuffledQuestions.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'test-item';
                const parts = item.q.split("[xxx]");
                div.innerHTML = `${i+1}. ${parts[0]} 
                    <select id="quest${i}">
                        <option value="">---</option>
                        ${item.opt.map(o => `<option value="${o}">${o}</option>`).join('')}
                    </select> 
                    ${parts[1]}`;
                container.appendChild(div);
            });
        }

        async function submitAll() {
            let correctCount = 0;
            let mistakesHtml = "";
            let log = [];

            shuffledQuestions.forEach((item, i) => {
                const userVal = document.getElementById(`quest${i}`).value;
                if (userVal === item.ans) {
                    correctCount++;
                } else {
                    mistakesHtml += `<li>${item.q.replace('[xxx]', '<u>' + item.ans + '</u>')}</li>`;
                }
                log.push(`Q${i+1}: ${userVal || 'no answer'}`);
            });

            showPage('pageResults');
            document.getElementById('mainNav').classList.add('hidden');
            document.getElementById('resName').innerText = userName;
            document.getElementById('scoreDisplay').innerText = `Result: ${correctCount} / ${shuffledQuestions.length}`;
            document.getElementById('mistakesList').innerHTML = mistakesHtml || "<li>Perfect! No mistakes found.</li>";

            new Chart(document.getElementById('resultChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Correct', 'Wrong'],
                    datasets: [{
                        data: [correctCount, shuffledQuestions.length - correctCount],
                        backgroundColor: ['#007e7a', '#ff6b6b'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '75%', plugins: { legend: { display: false } } }
            });

            fetch(SHEETS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    date: new Date().toLocaleString(),
                    name: userName,
                    title: "Infinitive/Gerund Smart Mixed",
                    result: `${correctCount}/${shuffledQuestions.length}`,
                    answers: log.join(' | ')
                })
            });
        }
    </script>
</body>
</html>
